<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tournament Draft</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Tournament Creator</h1>
    <p>Total Players: <span id="player-count">2</span></p>
    <div id="form-container">
        <div><label>Name: </label><input type="text" class="name-input" value="Player 1"></div>
        <div><label>Name: </label><input type="text" class="name-input" value="Player 2"></div>
    </div>
    
    <div class="controls">
        <button type="button" id="add-btn">Add Name Field</button>
        <button onclick="startDraft()">Start Selection Draft</button>
    </div>

    <div id="roulette-container" style="display:none; text-align:center; margin: 20px 0;">
        <h2 id="status-msg">Spinning for next player...</h2>
        <canvas id="wheelCanvas" width="400" height="400"></canvas>
    </div>

    <div id="draft-board"></div>

    <div id="bracket-container" class="bracket-wrapper"></div>

    <script src="sript.js"></script>
</body>
</html>
